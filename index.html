<!DOCTYPE html>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #022c22, #064e3b, #022c22);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* animated background */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,255,150,0.15), transparent 70%);
  animation: moveBg 10s linear infinite;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

.card {
  position: relative;
  width: 360px;
  padding: 30px 20px;
  border-radius: 25px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 40px rgba(0,255,150,0.2);
  text-align: center;
  z-index: 1;
}

/* glowing border */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 25px;
  padding: 2px;
  background: linear-gradient(45deg, #00ffae, transparent, #00ffae);
  -webkit-mask: 
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #00ffae;
  object-fit: cover;
  margin-bottom: 15px;
  box-shadow: 0 0 25px #00ffae;
}

h1 {
  font-size: 24px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 1px;
}

p {
  color: #000000;
  margin-bottom: 25px;
  font-weight: 600;
}

/* links */
.link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 12px 0;
  padding: 14px;
  border-radius: 14px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  background: rgba(0,255,150,0.1);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.link i {
  font-size: 18px;
}

/* hover glow */
.link:hover {
  transform: scale(1.07);
  box-shadow: 0 0 20px #00ffae;
  background: #00ffae;
  color: #003d2e;
}

/* shine effect */
.link::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: -100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition: 0.5s;
}

.link:hover::after {
  left: 100%;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #6ee7b7;
}

</style>

</head>

<body>

<div class="card">

<img src="photo_2026-05-06_11-46-08.jpg" class="avatar">

<h1>SHOYADBEK</h1>
<p>السلام عليكم
